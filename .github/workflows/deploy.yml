name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Bump version with build date
        run: |
          BUILD_DATE=$(date +'%b %-d, %Y')
          BUILD_NUM=$(git rev-list --count HEAD)
          NEW_VERSION="v4.${BUILD_NUM} · ${BUILD_DATE}"
          sed -i "s|export const APP_VERSION = '.*';|export const APP_VERSION = '${NEW_VERSION}';|" src/utils/constants.js
          echo "Version set to: ${NEW_VERSION}"
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e246c909cd0c462975902369c8aa7512
          command: pages deploy dist --project-name mystrainai --commit-dirty=true
          workingDirectory: frontend
