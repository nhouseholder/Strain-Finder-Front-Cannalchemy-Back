name: Harvest Dispensary Menus

on:
  schedule:
    # 6 AM PT (13:00 UTC) daily — menu data refreshes overnight
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Manual trigger for testing or on-demand refresh

jobs:
  harvest:
    runs-on: ubuntu-latest
    name: Harvest Weedmaps → KV
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run harvest script
        run: node scripts/harvest-dispensary-menus.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e246c909cd0c462975902369c8aa7512
          CLOUDFLARE_KV_NAMESPACE_ID: f7a280ca8f2347c8b5bcdb02b5ed6161
