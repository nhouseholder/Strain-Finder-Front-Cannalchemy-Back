<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#141e16"/>
      <stop offset="100%" style="stop-color:#0a0f0c"/>
    </radialGradient>

    <!-- Green accent gradient -->
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>

    <!-- Subtle glow behind the leaf -->
    <radialGradient id="glow" cx="50%" cy="42%" r="30%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.7"/>
    </linearGradient>

    <!-- Clip to circle for social media -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circular base -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <!-- Inner glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)" clip-path="url(#circleClip)"/>

  <!-- Cannabis fan leaf — 7 serrated palmate leaflets -->
  <g transform="translate(256, 200)" fill="url(#leaf)">
    <!-- Center leaflet (tallest) — narrow, serrated edges -->
    <path d="M0,-105 C3,-98 6,-88 7,-78 C5,-74 3,-72 6,-68 C8,-60 9,-50 9,-40
             C7,-36 5,-34 8,-28 C9,-20 9,-10 8,0 C6,8 4,14 0,22
             C-4,14 -6,8 -8,0 C-9,-10 -9,-20 -8,-28 C-5,-34 -7,-36 -9,-40
             C-9,-50 -8,-60 -6,-68 C-3,-72 -5,-74 -7,-78 C-6,-88 -3,-98 0,-105Z"/>

    <!-- Upper-left leaflet — angled ~35° out, serrated -->
    <path d="M-4,-8 C-14,-28 -28,-52 -38,-72 C-42,-78 -48,-84 -52,-90
             C-55,-86 -56,-80 -54,-72 C-52,-66 -48,-62 -50,-56
             C-48,-46 -44,-38 -40,-30 C-36,-24 -32,-20 -30,-14
             C-24,-6 -18,0 -10,6 C-8,8 -6,6 -4,-8Z"/>

    <!-- Upper-right leaflet — mirror -->
    <path d="M4,-8 C14,-28 28,-52 38,-72 C42,-78 48,-84 52,-90
             C55,-86 56,-80 54,-72 C52,-66 48,-62 50,-56
             C48,-46 44,-38 40,-30 C36,-24 32,-20 30,-14
             C24,-6 18,0 10,6 C8,8 6,6 4,-8Z"/>

    <!-- Mid-left leaflet — angled ~60° out, shorter, serrated -->
    <path d="M-6,4 C-18,-6 -34,-18 -48,-28 C-54,-32 -60,-36 -68,-38
             C-66,-33 -62,-28 -58,-22 C-54,-18 -50,-14 -48,-10
             C-42,-2 -36,4 -28,10 C-22,14 -16,16 -10,14
             C-8,12 -6,8 -6,4Z"/>

    <!-- Mid-right leaflet — mirror -->
    <path d="M6,4 C18,-6 34,-18 48,-28 C54,-32 60,-36 68,-38
             C66,-33 62,-28 58,-22 C54,-18 50,-14 48,-10
             C42,-2 36,4 28,10 C22,14 16,16 10,14
             C8,12 6,8 6,4Z"/>

    <!-- Lower-left leaflet — small, wide angle -->
    <path d="M-4,12 C-14,8 -26,2 -36,-2 C-40,-4 -44,-4 -48,-2
             C-44,2 -40,6 -34,10 C-28,14 -22,16 -16,18
             C-10,18 -6,16 -4,12Z" opacity="0.85"/>

    <!-- Lower-right leaflet — mirror -->
    <path d="M4,12 C14,8 26,2 36,-2 C40,-4 44,-4 48,-2
             C44,2 40,6 34,10 C28,14 22,16 16,18
             C10,18 6,16 4,12Z" opacity="0.85"/>

    <!-- Central vein lines for realism -->
    <g stroke="#0a0f0c" stroke-width="0.8" fill="none" opacity="0.15">
      <line x1="0" y1="-100" x2="0" y2="22"/>
      <line x1="-4" y1="-6" x2="-50" y2="-86"/>
      <line x1="4" y1="-6" x2="50" y2="-86"/>
      <line x1="-6" y1="4" x2="-64" y2="-34"/>
      <line x1="6" y1="4" x2="64" y2="-34"/>
      <line x1="-4" y1="12" x2="-44" y2="0"/>
      <line x1="4" y1="12" x2="44" y2="0"/>
    </g>

    <!-- Stem -->
    <rect x="-2.5" y="20" width="5" height="45" rx="2.5" opacity="0.7"/>
  </g>

  <!-- Neural network dots — AI concept (subtle) -->
  <g fill="#22c55e" opacity="0.12">
    <circle cx="130" cy="160" r="3"/>
    <circle cx="382" cy="160" r="3"/>
    <circle cx="100" cy="260" r="2.5"/>
    <circle cx="412" cy="260" r="2.5"/>
    <circle cx="150" cy="340" r="2"/>
    <circle cx="362" cy="340" r="2"/>
  </g>
  <!-- Connecting lines (neural net) -->
  <g stroke="#22c55e" stroke-width="0.8" opacity="0.06">
    <line x1="130" y1="160" x2="256" y2="140"/>
    <line x1="382" y1="160" x2="256" y2="140"/>
    <line x1="100" y1="260" x2="256" y2="205"/>
    <line x1="412" y1="260" x2="256" y2="205"/>
    <line x1="150" y1="340" x2="256" y2="280"/>
    <line x1="362" y1="340" x2="256" y2="280"/>
    <line x1="130" y1="160" x2="100" y2="260"/>
    <line x1="382" y1="160" x2="412" y2="260"/>
    <line x1="100" y1="260" x2="150" y2="340"/>
    <line x1="412" y1="260" x2="362" y2="340"/>
  </g>

  <!-- Brand name -->
  <text x="256" y="342" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#e8f0ea" text-anchor="middle" letter-spacing="1">
    MyStrain
  </text>

  <!-- AI badge -->
  <g transform="translate(256, 378)">
    <rect x="-24" y="-16" width="48" height="26" rx="6" fill="url(#leaf)" opacity="0.9"/>
    <text x="0" y="4" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="800" fill="#0a0f0c" text-anchor="middle" letter-spacing="2">AI</text>
  </g>

  <!-- Tagline -->
  <text x="256" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6a7a6e" text-anchor="middle" letter-spacing="3" text-transform="uppercase">
    CANNABIS SCIENCE
  </text>

  <!-- Thin accent arc at bottom -->
  <path d="M 130 440 Q 256 460 382 440" fill="none" stroke="url(#leaf)" stroke-width="1.5" opacity="0.3"/>
</svg>
