<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#141e16"/>
      <stop offset="100%" style="stop-color:#0a0f0c"/>
    </radialGradient>

    <!-- Green accent gradient -->
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>

    <!-- Subtle glow behind the leaf -->
    <radialGradient id="glow" cx="50%" cy="42%" r="30%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.7"/>
    </linearGradient>

    <!-- Clip to circle for social media -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circular base -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <!-- Inner glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)" clip-path="url(#circleClip)"/>

  <!-- Stylized cannabis leaf — 7-point simplified silhouette -->
  <g transform="translate(256, 205)" fill="url(#leaf)">
    <!-- Center blade -->
    <path d="M0,-95 C8,-70 14,-40 12,-10 C10,10 6,25 0,38 C-6,25 -10,10 -12,-10 C-14,-40 -8,-70 0,-95Z" opacity="0.95"/>
    <!-- Upper-left blade -->
    <path d="M-12,-12 C-30,-60 -55,-78 -70,-82 C-60,-62 -45,-40 -25,-18 C-18,-10 -14,-6 -12,-12Z" opacity="0.85"/>
    <!-- Upper-right blade -->
    <path d="M12,-12 C30,-60 55,-78 70,-82 C60,-62 45,-40 25,-18 C18,-10 14,-6 12,-12Z" opacity="0.85"/>
    <!-- Mid-left blade -->
    <path d="M-10,4 C-40,-20 -68,-28 -82,-26 C-66,-14 -46,0 -24,10 C-16,14 -12,10 -10,4Z" opacity="0.75"/>
    <!-- Mid-right blade -->
    <path d="M10,4 C40,-20 68,-28 82,-26 C66,-14 46,0 24,10 C16,14 12,10 10,4Z" opacity="0.75"/>
    <!-- Lower-left blade -->
    <path d="M-6,20 C-28,6 -48,2 -58,6 C-46,16 -30,24 -14,28 C-8,30 -6,26 -6,20Z" opacity="0.6"/>
    <!-- Lower-right blade -->
    <path d="M6,20 C28,6 48,2 58,6 C46,16 30,24 14,28 C8,30 6,26 6,20Z" opacity="0.6"/>
    <!-- Stem -->
    <rect x="-2.5" y="30" width="5" height="40" rx="2.5" opacity="0.7"/>
  </g>

  <!-- Neural network dots — AI concept (subtle) -->
  <g fill="#22c55e" opacity="0.12">
    <circle cx="130" cy="160" r="3"/>
    <circle cx="382" cy="160" r="3"/>
    <circle cx="100" cy="260" r="2.5"/>
    <circle cx="412" cy="260" r="2.5"/>
    <circle cx="150" cy="340" r="2"/>
    <circle cx="362" cy="340" r="2"/>
  </g>
  <!-- Connecting lines (neural net) -->
  <g stroke="#22c55e" stroke-width="0.8" opacity="0.06">
    <line x1="130" y1="160" x2="256" y2="140"/>
    <line x1="382" y1="160" x2="256" y2="140"/>
    <line x1="100" y1="260" x2="256" y2="205"/>
    <line x1="412" y1="260" x2="256" y2="205"/>
    <line x1="150" y1="340" x2="256" y2="280"/>
    <line x1="362" y1="340" x2="256" y2="280"/>
    <line x1="130" y1="160" x2="100" y2="260"/>
    <line x1="382" y1="160" x2="412" y2="260"/>
    <line x1="100" y1="260" x2="150" y2="340"/>
    <line x1="412" y1="260" x2="362" y2="340"/>
  </g>

  <!-- Brand name -->
  <text x="256" y="355" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#e8f0ea" text-anchor="middle" letter-spacing="1">
    MyStrain
  </text>

  <!-- AI badge -->
  <g transform="translate(256, 396)">
    <rect x="-30" y="-18" width="60" height="30" rx="7" fill="url(#leaf)" opacity="0.9"/>
    <text x="0" y="5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="#0a0f0c" text-anchor="middle" letter-spacing="2">AI</text>
  </g>

  <!-- Tagline -->
  <text x="256" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#6a7a6e" text-anchor="middle" letter-spacing="3">
    CANNABIS SCIENCE
  </text>

  <!-- Thin accent arc at bottom -->
  <path d="M 130 458 Q 256 475 382 458" fill="none" stroke="url(#leaf)" stroke-width="1.5" opacity="0.3"/>
</svg>
